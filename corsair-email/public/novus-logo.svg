      <stop offset="0.52" stop-color="#b999ff"/>
      <stop offset="1" stop-color="#efd8ff"/>
    </linearGradient>
    <linearGradient id="envelopeInner" x1="33" y1="52" x2="103" y2="101" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a57cff"/>
