services:
  postgres:
    image: postgres:17-alpine
    container_name: corsair-email-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corsair_email
    ports:
      - "5432:5432"
    volumes:
      - corsair-email-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d corsair_email"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  corsair-email-postgres:
